<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeta — Server Stats</title>
  <meta name="theme-color" content="#00ae86">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo"><span>Z</span>ETA</a>
      <ul class="links">
        <li><a href="index.html">Home</a></li>
        <li><a href="leaderboard.html">Leaderboard</a></li>
        <li><a href="stats.html" class="active">Stats</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <section class="section-title" style="padding-top: 40px;">
      <span class="badge" style="margin-bottom:16px; display:inline-block;">Live Data</span>
      <h2>Server Stats</h2>
      <p>Real-time statistics from the Zeta Discord server.</p>
    </section>

    <div id="stats-container">
      <div class="stats-grid">
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-members">--</div>
          <div class="stat-label">Members</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-online">--</div>
          <div class="stat-label">Online</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-verified">--</div>
          <div class="stat-label">Verified</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-boosts">--</div>
          <div class="stat-label">Boosts</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-invites">--</div>
          <div class="stat-label">Total Invites</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-tickets">--</div>
          <div class="stat-label">Tickets Opened</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-channels">--</div>
          <div class="stat-label">Channels</div>
        </div>
        <div class="card stat-card fade-up">
          <div class="stat-value" id="stat-roles">--</div>
          <div class="stat-label">Roles</div>
        </div>
      </div>

      <p id="stats-updated" style="text-align:center; color: var(--text-dim); font-size:13px; margin-top:32px;"></p>
    </div>
  </main>

  <footer>
    <p>Zeta &copy; 2026 &mdash; Built for the community.</p>
  </footer>

  <script>
   
    const API_URL = "WORKER_URL";

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/api/stats`);
        if (!res.ok) throw new Error("Failed to fetch");
        const data = await res.json();

        document.getElementById("stat-members").textContent = data.members ?? "--";
        document.getElementById("stat-online").textContent = data.online ?? "--";
        document.getElementById("stat-verified").textContent = data.verified ?? "--";
        document.getElementById("stat-boosts").textContent = data.boosts ?? "--";
        document.getElementById("stat-invites").textContent = data.totalInvites ?? "--";
        document.getElementById("stat-tickets").textContent = data.tickets ?? "--";
        document.getElementById("stat-channels").textContent = data.channels ?? "--";
        document.getElementById("stat-roles").textContent = data.roles ?? "--";

        if (data.updatedAt) {
          const ago = timeAgo(new Date(data.updatedAt));
          document.getElementById("stats-updated").textContent = `Last updated ${ago}`;
        }
      } catch (e) {
        document.getElementById("stats-updated").textContent = "Could not load stats. Try again later.";
      }
    }

    function timeAgo(date) {
      const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
      if (seconds < 60) return "just now";
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    loadStats();
  </script>
</body>
</html>
